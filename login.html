<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Verses</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4A2C2A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Verses" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js" defer></script>
  <script src="db.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'));
    }
  </script>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">VERSES</a>
    <div class="nav-links">
      <a href="signup.html" class="nav-link active">Create account</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="auth-brand-name">VERSES</span>
        <span class="auth-brand-tag">Where words meet connection</span>
      </div>
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Your next conversation is waiting.</p>
      <div id="error-msg" class="error-msg"></div>
      <form id="login-form" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password" required />
          <div style="text-align:right;margin-top:0.4rem;">
            <a href="#" onclick="openForgotPw(event)" style="font-size:0.8rem;color:var(--gold);text-decoration:none;">Forgot password?</a>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Sign in</button>
      </form>
      <div class="auth-divider">or</div>
      <div style="text-align:center;margin-bottom:0.5rem;">
        <button class="btn btn-secondary btn-full" onclick="demoLogin()">✦ Try a demo account</button>
      </div>
      <div class="auth-switch">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal-overlay" id="forgot-modal" style="display:none;align-items:center;">
    <div class="modal-sheet" style="max-width:420px;width:92%;">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Reset your password</h3>
      <p class="modal-sub">Enter your email and choose a new password.</p>
      <div id="fp-error" class="error-msg"></div>
      <div id="fp-success" class="success-msg"></div>
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input class="form-input" type="email" id="fp-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">New password</label>
        <input class="form-input" type="password" id="fp-pw" placeholder="At least 6 characters" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" style="flex:1" onclick="submitForgotPw()">Reset password</button>
        <button class="btn btn-ghost" onclick="closeForgotPw()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="toast" id="verses-toast"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => VersesApp.redirectIfLoggedIn());

    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error-msg');
      const btn      = document.getElementById('submit-btn');
      errEl.style.display = 'none';
      if (!email || !password) { showErr('Please fill in all fields.'); return; }
      btn.textContent = 'Signing in…'; btn.disabled = true;
      const { profile, error } = await VersesDB.dbLogin(email, password);
      if (error) {
        if (error.includes('No account found')) {
          errEl.innerHTML = 'No account found with that email. <a href="signup.html" style="color:var(--primary);font-weight:600;">Create one →</a>';
          errEl.style.display = 'block';
        } else {
          showErr(error);
        }
        btn.textContent = 'Sign in'; btn.disabled = false; return;
      }
      VersesApp.setSession({ id: profile.id, name: profile.name, email: profile.email });
      window.location.href = 'feed.html';
      function showErr(msg) { errEl.textContent = msg; errEl.style.display = 'block'; }
    }

    async function demoLogin() {
      const btn = document.querySelector('.btn-secondary');
      btn.textContent = 'Setting up demo…'; btn.disabled = true;
      const demoEmail = 'demo@verses.app', demoName = 'Guest Poet', demoPw = 'demo1234';
      let { profile } = await VersesDB.dbLogin(demoEmail, demoPw);
      if (!profile) {
        const res = await VersesDB.dbSignup(demoEmail, demoName, demoPw);
        profile = res.profile;
      }
      if (!profile) { btn.textContent = '✦ Try a demo account'; btn.disabled = false; return; }
      VersesApp.setSession({ id: profile.id, name: profile.name, email: profile.email });
      window.location.href = 'feed.html';
    }

    function openForgotPw(e) {
      e.preventDefault();
      document.getElementById('fp-error').style.display   = 'none';
      document.getElementById('fp-success').style.display = 'none';
      document.getElementById('fp-email').value = document.getElementById('email').value;
      document.getElementById('fp-pw').value    = '';
      document.getElementById('forgot-modal').style.display = 'flex';
    }

    function closeForgotPw() {
      document.getElementById('forgot-modal').style.display = 'none';
    }

    async function submitForgotPw() {
      const email = document.getElementById('fp-email').value.trim().toLowerCase();
      const pw    = document.getElementById('fp-pw').value;
      const errEl = document.getElementById('fp-error');
      const okEl  = document.getElementById('fp-success');
      errEl.style.display = 'none'; okEl.style.display = 'none';
      if (!email) { errEl.textContent = 'Please enter your email.'; errEl.style.display = 'block'; return; }
      if (pw.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }
      const { profile, error } = await VersesDB.dbResetPassword(email, pw);
      if (error) { errEl.textContent = error; errEl.style.display = 'block'; return; }
      okEl.textContent = 'Password reset! You can now sign in.';
      okEl.style.display = 'block';
      document.getElementById('email').value    = email;
      document.getElementById('password').value = pw;
      setTimeout(closeForgotPw, 2000);
    }

    document.getElementById('forgot-modal').addEventListener('click', function(e) {
      if (e.target === this) closeForgotPw();
    });
  </script>

</body>
</html>
