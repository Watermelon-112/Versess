<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Verses</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4A2C2A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Verses" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <script src="app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js');
      });
    }
  </script>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">VERSES</a>
    <div class="nav-links">
      <a href="signup.html" class="nav-link active">Create account</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-brand">
        <span class="auth-brand-name">VERSES</span>
        <span class="auth-brand-tag">Where words meet connection</span>
      </div>

      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Your next conversation is waiting.</p>

      <div id="error-msg" class="error-msg"></div>

      <form id="login-form" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            placeholder="Your password"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
          Sign in
        </button>
      </form>

      <div class="auth-divider">or</div>

      <div style="text-align:center; margin-bottom: 0.5rem;">
        <button class="btn btn-secondary btn-full" onclick="demoLogin()">
          ✦ Try a demo account
        </button>
      </div>

      <div class="auth-switch">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </div>

    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      VersesApp.redirectIfLoggedIn();
    });

    function handleLogin(e) {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error-msg');
      const btn      = document.getElementById('submit-btn');

      errEl.style.display = 'none';

      if (!email || !password) {
        showError('Please fill in all fields.'); return;
      }

      const users = VersesApp.getUsers();
      const user  = users.find(u => u.email === email && u.password === password);

      if (!user) {
        showError('Incorrect email or password. Please try again.'); return;
      }

      btn.textContent = '✓ Signing you in…';
      btn.disabled = true;

      VersesApp.setSession({ id: user.id, name: user.name, email: user.email });
      setTimeout(() => { window.location.href = 'feed.html'; }, 800);

      function showError(msg) {
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }
    }

    function demoLogin() {
      const users = VersesApp.getUsers();
      let demo = users.find(u => u.email === 'demo@verses.app');

      if (!demo) {
        demo = {
          id: 9999,
          name: 'Guest Poet',
          email: 'demo@verses.app',
          password: 'demo1234',
          createdAt: new Date().toISOString()
        };
        users.push(demo);
        VersesApp.saveUsers(users);
      }

      VersesApp.setSession({ id: demo.id, name: demo.name, email: demo.email });
      window.location.href = 'feed.html';
    }
  </script>

</body>
</html>
