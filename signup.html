<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Verses</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4A2C2A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Verses" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <script src="app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js');
      });
    }
  </script>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">VERSES</a>
    <div class="nav-links">
      <a href="login.html" class="nav-link">Already have an account?</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-brand">
        <span class="auth-brand-name">VERSES</span>
        <span class="auth-brand-tag">Where words meet connection</span>
      </div>

      <h2 class="auth-title">Create your voice</h2>
      <p class="auth-subtitle">Join a community built on depth, not appearances.</p>

      <div id="error-msg" class="error-msg"></div>
      <div id="success-msg" class="success-msg"></div>

      <form id="signup-form" onsubmit="handleSignup(event)" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Your name</label>
          <input
            class="form-input"
            type="text"
            id="name"
            placeholder="How should people know you?"
            autocomplete="name"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            placeholder="At least 6 characters"
            autocomplete="new-password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
          ✦ Create my account
        </button>
      </form>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Sign in</a>
      </div>

    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      VersesApp.redirectIfLoggedIn();
    });

    function handleSignup(e) {
      e.preventDefault();

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error-msg');
      const okEl     = document.getElementById('success-msg');
      const btn      = document.getElementById('submit-btn');

      errEl.style.display = 'none';
      okEl.style.display  = 'none';

      if (!name) {
        showError('Please enter your name.'); return;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('Please enter a valid email address.'); return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters.'); return;
      }

      const users = VersesApp.getUsers();
      if (users.find(u => u.email === email)) {
        showError('An account with this email already exists.'); return;
      }

      const newUser = { id: Date.now(), name, email, password, createdAt: new Date().toISOString() };
      users.push(newUser);
      VersesApp.saveUsers(users);

      okEl.textContent = 'Account created! Redirecting you to your feed…';
      okEl.style.display = 'block';
      btn.textContent = '✓ Success!';
      btn.disabled = true;

      VersesApp.setSession({ id: newUser.id, name: newUser.name, email: newUser.email });

      setTimeout(() => { window.location.href = 'feed.html'; }, 1200);

      function showError(msg) {
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }
    }
  </script>

</body>
</html>
