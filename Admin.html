<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Verses</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js" defer></script>
  <script src="db.js" defer></script>
  <style>
    .admin-wrap { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    .admin-header { background: var(--dark-brown); color: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; }
    .admin-header h1 { font-family: 'Playfair Display', serif; margin: 0 0 0.3rem; }
    .admin-header p  { margin: 0; opacity: 0.7; font-size: 0.9rem; }
    .report-card { background: white; border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem;
                   box-shadow: 0 2px 8px rgba(74,44,42,0.08); border: 1px solid var(--soft-beige); }
    .report-meta { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.8rem; }
    .report-reason { font-weight: 600; color: var(--dark-brown); font-size: 0.95rem; }
    .report-time   { font-size: 0.78rem; color: var(--text-light); }
    .report-parties { font-size: 0.85rem; color: var(--text-mid); margin-bottom: 0.6rem; }
    .report-parties strong { color: var(--dark-brown); }
    .report-details { font-size: 0.88rem; color: var(--text-mid); font-style: italic; margin-bottom: 0.8rem;
                      padding: 0.6rem; background: var(--cream); border-radius: 8px; }
    .report-evidence { margin-bottom: 0.8rem; }
    .report-evidence img, .report-evidence video {
      max-width: 100%; max-height: 200px; border-radius: 8px; cursor: pointer; }
    .report-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .btn-danger { background: #c0392b; color: white; border: none; padding: 0.5rem 1rem;
                  border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .btn-danger:hover { background: #a93226; }
    .btn-dismiss { background: transparent; border: 1px solid var(--text-light); color: var(--text-mid);
                   padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
    .users-section { margin-top: 2rem; }
    .user-row { display: flex; align-items: center; gap: 1rem; background: white; padding: 0.9rem 1.2rem;
                border-radius: 10px; margin-bottom: 0.6rem; box-shadow: 0 1px 4px rgba(74,44,42,0.06); }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gold);
                   display: flex; align-items: center; justify-content: center; font-weight: 700;
                   color: var(--dark-brown); font-size: 0.85rem; flex-shrink: 0; }
    .user-info { flex: 1; }
    .user-name  { font-weight: 600; color: var(--dark-brown); font-size: 0.9rem; }
    .user-email { font-size: 0.78rem; color: var(--text-light); }
    .badge-count { background: var(--dark-brown); color: white; font-size: 0.72rem; padding: 0.15rem 0.5rem;
                   border-radius: 10px; margin-left: 0.4rem; }
    .tab-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tab-btn { padding: 0.5rem 1.2rem; border-radius: 20px; border: 1px solid var(--soft-beige);
               background: white; color: var(--text-mid); cursor: pointer; font-size: 0.85rem; }
    .tab-btn.active { background: var(--dark-brown); color: white; border-color: var(--dark-brown); }
    #login-screen { max-width: 380px; margin: 6rem auto; padding: 2rem; background: white;
                    border-radius: 16px; box-shadow: 0 4px 24px rgba(74,44,42,0.12); text-align: center; }
    #login-screen h2 { font-family: 'Playfair Display', serif; color: var(--dark-brown); margin-bottom: 0.5rem; }
    #login-screen p  { color: var(--text-light); font-size: 0.88rem; margin-bottom: 1.5rem; }
    .empty-admin { text-align: center; padding: 3rem 1rem; color: var(--text-light); }
  </style>
</head>
<body style="background: var(--cream); min-height: 100vh;">

  <div id="login-screen">
    <h2>VERSES</h2>
    <p>Admin access only</p>
    <input class="form-input" type="password" id="admin-pw" placeholder="Admin password" style="margin-bottom:1rem;" />
    <button class="btn btn-primary btn-full" onclick="adminLogin()">Enter</button>
    <div id="admin-err" style="color:#c0392b;font-size:0.85rem;margin-top:0.8rem;"></div>
  </div>

  <div id="admin-panel" style="display:none;">
    <nav class="nav" style="position:sticky;top:0;z-index:100;">
      <span class="nav-logo">VERSES · Admin</span>
      <button class="btn btn-ghost" onclick="adminLogout()">Sign out</button>
    </nav>

    <div class="admin-wrap">
      <div class="admin-header">
        <h1>Dashboard</h1>
        <p id="admin-summary">Loading…</p>
      </div>

      <div class="tab-row">
        <button class="tab-btn active" onclick="showTab('reports')">Reports <span class="badge-count" id="rpt-count">0</span></button>
        <button class="tab-btn" onclick="showTab('users')">All Users <span class="badge-count" id="usr-count">0</span></button>
      </div>

      <div id="tab-reports">
        <div id="reports-list"><div class="empty-admin">Loading reports…</div></div>
      </div>

      <div id="tab-users" style="display:none;">
        <div id="users-list"><div class="empty-admin">Loading users…</div></div>
      </div>
    </div>
  </div>

  <div class="toast" id="verses-toast"></div>

  <script>
    const ADMIN_PASSWORD = 'verses-admin-2024';
    let adminAuthed = false;
    let allReports  = [];
    let allUsers    = [];

    function adminLogin() {
      const pw = document.getElementById('admin-pw').value;
      if (pw !== ADMIN_PASSWORD) {
        document.getElementById('admin-err').textContent = 'Incorrect password.';
        return;
      }
      adminAuthed = true;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display  = 'block';
      loadAll();
    }

    document.getElementById('admin-pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') adminLogin();
    });

    function adminLogout() {
      adminAuthed = false;
      document.getElementById('admin-panel').style.display  = 'none';
      document.getElementById('login-screen').style.display = 'block';
    }

    function showTab(tab) {
      document.getElementById('tab-reports').style.display = tab === 'reports' ? 'block' : 'none';
      document.getElementById('tab-users').style.display   = tab === 'users'   ? 'block' : 'none';
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'reports') || (i === 1 && tab === 'users'));
      });
    }

    async function loadAll() {
      [allReports, allUsers] = await Promise.all([
        VersesDB.dbGetAllReports(),
        VersesDB.dbGetAllProfiles(),
      ]);
      document.getElementById('rpt-count').textContent = allReports.length;
      document.getElementById('usr-count').textContent = allUsers.length;
      document.getElementById('admin-summary').textContent =
        `${allUsers.length} users · ${allReports.filter(r => r.status === 'pending').length} pending reports`;
      renderReports();
      renderUsers();
    }

    function renderReports() {
      const el = document.getElementById('reports-list');
      if (!allReports.length) {
        el.innerHTML = '<div class="empty-admin">✦ No reports yet</div>';
        return;
      }
      el.innerHTML = '';
      allReports.forEach(r => {
        const card = document.createElement('div');
        card.className = 'report-card';
        const evidenceHtml = r.evidence_url
          ? r.evidence_url.includes('.mp4')
            ? `<div class="report-evidence"><video src="${r.evidence_url}" controls></video></div>`
            : `<div class="report-evidence"><img src="${r.evidence_url}" onclick="window.open(this.src)" alt="Evidence" /></div>`
          : '';
        card.innerHTML = `
          <div class="report-meta">
            <span class="report-reason">⚠ ${r.reason}</span>
            <span class="report-time">${new Date(r.created_at).toLocaleDateString()}</span>
          </div>
          <div class="report-parties">
            Reported by <strong>${r.reporter?.name || 'Unknown'}</strong> (${r.reporter?.email || ''})
            against <strong>${r.reported?.name || 'Unknown'}</strong> (${r.reported?.email || ''})
          </div>
          ${r.details ? `<div class="report-details">"${r.details}"</div>` : ''}
          ${evidenceHtml}
          <div class="report-actions">
            <button class="btn-danger" onclick="removeUser('${r.reported_id}', '${r.id}')">
              🚫 Remove ${r.reported?.name || 'User'}
            </button>
            <button class="btn-dismiss" onclick="dismissReport('${r.id}')">Dismiss</button>
          </div>
        `;
        el.appendChild(card);
      });
    }

    function renderUsers() {
      const el = document.getElementById('users-list');
      if (!allUsers.length) {
        el.innerHTML = '<div class="empty-admin">No users yet</div>';
        return;
      }
      el.innerHTML = '';
      allUsers.forEach(u => {
        const row = document.createElement('div');
        row.className = 'user-row';
        const initials = VersesApp.getInitials(u.name || '?');
        row.innerHTML = `
          <div class="user-avatar">${initials}</div>
          <div class="user-info">
            <div class="user-name">${u.name}</div>
            <div class="user-email">${u.email} · joined ${new Date(u.created_at).toLocaleDateString()}</div>
          </div>
          <button class="btn-danger" onclick="removeUser('${u.id}', null)">Remove</button>
        `;
        el.appendChild(row);
      });
    }

    async function removeUser(userId, reportId) {
      if (!confirm('Permanently remove this user and all their data?')) return;
      await VersesDB.dbDeleteAccount(userId);
      if (reportId) await VersesDB.dbDeleteReport(reportId);
      VersesApp.showToast('User removed');
      await loadAll();
    }

    async function dismissReport(reportId) {
      await VersesDB.dbDeleteReport(reportId);
      VersesApp.showToast('Report dismissed');
      await loadAll();
    }
  </script>

</body>
</html>
